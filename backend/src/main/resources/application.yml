spring:
  application:
    name: inovatech-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inovatech}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:Inacio123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_MB:10}MB
      max-request-size: ${UPLOAD_MAX_MB:10}MB

  async:
    executor:
      core-pool-size: 4
      max-pool-size: 8
      queue-capacity: 100

server:
  port: 8080
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

app:
  jwt:
    secret: ${JWT_SECRET:inovatech-super-secret-key-2026-troque-em-producao}
    access-expiration: ${JWT_ACCESS_EXPIRATION:3600}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}
  front-url: ${APP_FRONT_URL:http://localhost:5173}
  back-url: ${APP_BACK_URL:http://localhost:8080}
  mail:
    from: ${SMTP_FROM:Inovatech <no-reply@inovatech.edu>}
  upload:
    dir: ${UPLOAD_DIR:./uploads}

logging:
  level:
    br.com.inovatech: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
