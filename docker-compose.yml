version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: inovatech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-inovatech}
      POSTGRES_USER: ${DB_USER:-inovatech}
      POSTGRES_PASSWORD: ${DB_PASS:-inovatech}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-inovatech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: inovatech-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@inovatech.edu
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - dev

volumes:
  postgres_data:
